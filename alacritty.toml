# Colors (Everforest Dark)
[mouse]
hide_when_typing = true
# Default colors
[colors.primary]
background = '#1E222A'
foreground = '#eeeeee'
# Normal colors
[colors.normal]
black   = '#282C34'
red     = '#cc3333'
green   = '#5faf00'
yellow  = '#eddb2a'
blue    = '#00a0ff'
magenta = '#d699b6'
cyan    = '#0087af'
white   = '#eeeeee'

# Bright colors
[colors.bright]
black   = '#475258'
red     = '#e67e80'
green   = '#a7c080'
yellow  = '#dbbc7f'
blue    = '#7fbbb3'
magenta = '#d699b6'
cyan    = '#83c092'
white   = '#d3c6aa'

[font]
normal = { family = "CaskaydiaMono Nerd Font", style = "Regular" }

