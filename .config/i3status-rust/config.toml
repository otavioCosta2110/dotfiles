icons_format = "{icon}"

[theme.overrides]
idle_bg = "#000000"
idle_fg = "#ffffff"
# good_fg = "#d4be98"
# good_bg = "#000000"
# warning_fg = "#d4be98"
# warning_bg = "#000000"

[icons]
icons = "awesome4"
[icons.overrides]
bat = ["  ", "  ", "  ", "  "]
bat_charging = " "

[[block]]
block = "custom"
command = "~/.config/waybar/scripts/screen_capture.sh"
json = true
interval = "once"
watch_files = ["~/.config/waybar/.screen_recorder_state"]
[[block.click]]
button = "left"
cmd = "~/.config/waybar/scripts/screen_capture.sh toggle"

# [[block.click]]
# button = "left"
# cmd = "exo-open https://github.com/notifications?query=is%3Aunread"

[[block]]
block = "net"
format = "   {$ssid |Wired connection} "
[[block.click]]
button = "left"
cmd = "~/.local/scripts/launch-wifi"

[[block]]
block = "sound"
format = " {$icon}{  $volume |} "
headphones_indicator = true
[[block.click]]
button = "left"
cmd = "pavucontrol"


[[block]]
block = "backlight"
format = " 🞻 $brightness "

# [[block]]
# block = "amd_gpu"
# format = " $icon    $utilization "
# [[block.click]]
# button = "left"
# cmd = "radeon-profile"

[[block]]
block = "cpu"
format = " CPU $utilization "

[[block]]
block = "disk_space"
path = "/"
info_type = "available"
alert_unit = "GB"
interval = 100
warning = 20.0
alert = 10.0
format = "  DISK  $available.eng(w:2) / $total  "

[[block]]
block = "memory"
format = " RAM $mem_used / $mem_total "

[[block]]
block = "battery"
full_format = " $icon $percentage "
charging_format = " $icon $percentage "
not_charging_format = " $icon $percentage "
empty_format = " $icon $percentage "
format = " $icon $percentage "

[[block]]
block = "custom"
command = "~/.local/scripts/powerprofiles icon"
signal = 4
interval = "once"
[[block.click]]
button = "left"
cmd = "~/.local/scripts/powerprofiles next"

[[block]]
block = "time"
interval = 5
format = " $timestamp.datetime(f:'%d/%m %R') "
[[block.click]]
button = "left"
cmd = "alacritty --title calcurse -e bash -c calcurse"
