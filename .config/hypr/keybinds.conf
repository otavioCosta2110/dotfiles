################ Key Bindings
# Mod key definition
$mod = SUPER
$mod2 = ALT

# Application keybinds
bind = $mod, RETURN, exec, alacritty
bind = $mod, KP_ENTER, exec, alacritty
bind = CONTROL ALT, T, exec, alacritty
bind = CONTROL ALT, RETURN, exec, alacritty
bind = $mod SHIFT, RETURN, exec, alacritty -e $SHELL -c "cd ~/dev && exec $SHELL"
bind = SHIFT ALT, RETURN, exec, alacritty
bind = CONTROL ALT, KP_ENTER, exec, alacritty

# System applications - Dank Material Shell Spotlight
bind = $mod SHIFT, D, exec, dms ipc call spotlight open
bind = $mod, D, exec, dms ipc call spotlight toggle
bind = $mod2, D, exec, discord
bind = $mod CONTROL, R, exec, /home/otavio/.local/scripts/recording.sh
bind = $mod, V, exec, dms ipc call clipboard toggle
bind = CONTROL SHIFT, ESCAPE, exec, alacritty -e btop
bind = CONTROL ALT, M, exec, xfce4-settings-manager
bind = CONTROL ALT, U, exec, pavucontrol
bind = $mod CONTROL, S, exec, spotify
bind = $mod, F1, exec, exo-open --launch webbrowser
bind = $mod, W, exec, exo-open --launch webbrowser
bind = $mod, E, exec, Thunar
bind = $mod, O, exec, alacritty -e bash -c "/home/otavio/.local/scripts/run-old-game-launcher"
bind = $mod SHIFT, F, exec, ~/.local/scripts/favs
bind = $mod SHIFT, V, exec, alacritty -e "/home/otavio/.local/scripts/tmux-sessionizer.sh"
# Screenshots
bind = , PRINT, exec, ~/.local/scripts/screenshot.sh
bind = $mod SHIFT, S, exec, hyprshot -m region -z


# System controls
bind = $mod SHIFT, Q, exit
bind = $mod SHIFT, C, exec, hyprctl reload
bind = $mod SHIFT, R, exec, hyprctl reload

# Window management
bind = $mod, Q, killactive
bind = $mod, F, fullscreen
bind = $mod SHIFT, SPACE, togglefloating
bind = $mod, SPACE, cyclenext

# Focus movement
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r
bind = $mod, LEFT, movefocus, l
bind = $mod, DOWN, movefocus, d
bind = $mod, UP, movefocus, u
bind = $mod, RIGHT, movefocus, r

# Move windows
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, LEFT, movewindow, l
bind = $mod SHIFT, DOWN, movewindow, d
bind = $mod SHIFT, UP, movewindow, u
bind = $mod SHIFT, RIGHT, movewindow, r

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
bind = $mod, MINUS, workspace, 11
bind = $mod, EQUAL, workspace, 12

# Move windows to workspaces
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10
bind = $mod SHIFT, MINUS, movetoworkspace, 11
bind = $mod SHIFT, EQUAL, movetoworkspace, 12

# Workspace navigation
bind = ALT, TAB, workspace, +1
bind = ALT SHIFT, TAB, workspace, -1
bind = $mod, TAB, workspace, previous

# Layout controls
bind = $mod, G, layoutmsg, orientationleft
bind = $mod, S, layoutmsg, orientationtop
bind = $mod, Z, layoutmsg, orientationcenter
bind = $mod SHIFT, E, togglesplit

# Resize mode
bind = $mod, R, submap, resize
submap = resize
binde = , H, resizeactive, -5 0
binde = , J, resizeactive, 0 5
binde = , K, resizeactive, 0 -5
binde = , L, resizeactive, 5 0
binde = , LEFT, resizeactive, -10 0
binde = , DOWN, resizeactive, 0 10
binde = , UP, resizeactive, 0 -10
binde = , RIGHT, resizeactive, 10 0
bind = , ESCAPE, submap, reset
bind = , RETURN, submap, reset
submap = reset

# Border controls
bind = $mod SHIFT, B, exec, hyprctl keyword general:border_size 0
bind = $mod, T, exec, hyprctl keyword general:border_size 3
bind = $mod, Y, exec, hyprctl keyword general:border_size 3
bind = $mod, U, exec, hyprctl keyword general:border_size 0

# Media keys
# binde = ,XF86AudioRaiseVolume, exec, ~/.local/scripts/volume.sh --inc
# binde = ,XF86AudioLowerVolume, exec, ~/.local/scripts/volume.sh --dec
# bind = ,XF86AudioMute, exec, ~/.local/scripts/volume.sh --toggle
# binde = ,XF86AudioRaiseVolume, exec, ~/.local/scripts/volume.sh --inc
# binde = ,XF86AudioLowerVolume, exec, ~/.local/scripts/volume.sh --dec
# bind = ,XF86AudioMute, exec, ~/.local/scripts/volume.sh --toggle
# Dank Material Shell Audio Controls
bind = , XF86AudioRaiseVolume, exec, dms ipc call audio increment 5
bind = , XF86AudioLowerVolume, exec, dms ipc call audio decrement 5
bind = , XF86AudioMute, exec, dms ipc call audio mute

# Dank Material Shell MPRIS Media Controls
bind = , XF86AudioPlay, exec, dms ipc call mpris playPause
bind = , XF86AudioNext, exec, dms ipc call mpris next
bind = , XF86AudioPrev, exec, dms ipc call mpris previous
bind = , XF86AudioStop, exec, dms ipc call mpris stop
# Dank Material Shell Brightness Controls
bind = , XF86MonBrightnessUp, exec, dms ipc call brightness increment 5
bind = , XF86MonBrightnessDown, exec, dms ipc call brightness decrement 5

bind = $mod, t, exec, notify-send "Window Info" "$(hyprctl activewindow -j | jq -r '"Class: \(.class)\nTitle: \(.title)\nWorkspace: \(.workspace.name)\nSize: \(.size[0])x\(.size[1])\nPosition: \(.at[0]),\(.at[1])"')"
# Dank Material Shell Modal Controls
bind = $mod, comma, exec, dms ipc call settings toggle
bind = $mod, period, exec, dms ipc call notifications toggle
bind = $mod CONTROL, N, exec, dms ipc call notifications toggle
bind = $mod CONTROL, V, exec, dms ipc call clipboard toggle
bind = $mod CONTROL, P, exec, dms ipc call processlist toggle
bind = $mod CONTROL, L, exec, dms ipc call lock lock
bind = $mod CONTROL, O, exec, dms ipc call control-center toggle
bind = $mod CONTROL, W, exec, dms ipc call notepad toggle
bind = $mod CONTROL, A, exec, dms ipc call dock toggle
bind = $mod CONTROL, T, exec, dms ipc call theme toggle
bind = $mod CONTROL, B, exec, dms ipc call bar toggle index 0
bind = $mod SHIFT, period, exec, dms ipc call powermenu toggle
bind = $mod SHIFT, comma, exec, dms ipc call dash toggle

# Dank Material Shell System Utilities
bind = $mod, F9, exec, dms ipc call keybinds toggle hyprland
bind = $mod, F10, exec, dms ipc call hypr toggleOverview
bind = $mod CONTROL, I, exec, dms ipc call inhibit toggle
bind = $mod CONTROL, H, exec, dms ipc call night toggle

# Mouse bindings
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

