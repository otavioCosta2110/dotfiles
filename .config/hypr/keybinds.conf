################ Key Bindings
# Mod key definition
$mod = SUPER
$mod2 = ALT

# Application keybinds
bind = $mod, RETURN, exec, alacritty
bind = $mod, KP_ENTER, exec, alacritty
bind = CONTROL ALT, T, exec, alacritty
bind = CONTROL ALT, RETURN, exec, alacritty
bind = $mod SHIFT, RETURN, exec, alacritty -e $SHELL -c "cd ~/dev && exec $SHELL"
bind = SHIFT ALT, RETURN, exec, alacritty
bind = CONTROL ALT, KP_ENTER, exec, alacritty

# System applications
bind = $mod SHIFT, D, exec, dmenu_run -i -nb '#191919' -nf '#fea63c' -sb '#fea63c' -sf '#191919' -fn 'NotoMonoRegular:bold:pixelsize=14'
bind = $mod, D, exec, fuzzel
# bind = $mod, D, exec, fuzzel
bind = $mod2, D, exec, discord
bind = $mod CONTROL, R, exec, /home/otavio/.local/scripts/recording.sh
bind = $mod, V, exec, pkill fuzzel || cliphist list | fuzzel --dmenu | cliphist decode | wl-copy
bind = CONTROL SHIFT, ESCAPE, exec, alacritty -e btop
bind = CONTROL ALT, M, exec, xfce4-settings-manager
bind = CONTROL ALT, U, exec, pavucontrol
bind = $mod CONTROL, S, exec, spotify
bind = $mod, F1, exec, exo-open --launch webbrowser
bind = $mod, W, exec, exo-open --launch webbrowser
bind = $mod, E, exec, Thunar
bind = $mod, O, exec, alacritty -e bash -c "/home/otavio/.local/scripts/run-old-game-launcher"
bind = $mod SHIFT, F, exec, ~/.local/scripts/favs
bind = $mod SHIFT, V, exec, alacritty -e "/home/otavio/.local/scripts/tmux-sessionizer.sh"
# Screenshots
bind = , PRINT, exec, ~/.local/scripts/screenshot.sh
bind = $mod SHIFT, S, exec, hyprshot -m region -z


# System controls
bind = $mod SHIFT, Q, exit
bind = $mod SHIFT, C, exec, hyprctl reload
bind = $mod SHIFT, R, exec, hyprctl reload

# Window management
bind = $mod, Q, killactive
bind = $mod, F, fullscreen
bind = $mod SHIFT, SPACE, togglefloating
bind = $mod, SPACE, cyclenext

# Focus movement
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r
bind = $mod, LEFT, movefocus, l
bind = $mod, DOWN, movefocus, d
bind = $mod, UP, movefocus, u
bind = $mod, RIGHT, movefocus, r

# Move windows
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, LEFT, movewindow, l
bind = $mod SHIFT, DOWN, movewindow, d
bind = $mod SHIFT, UP, movewindow, u
bind = $mod SHIFT, RIGHT, movewindow, r

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
bind = $mod, MINUS, workspace, 11
bind = $mod, EQUAL, workspace, 12

# Move windows to workspaces
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10
bind = $mod SHIFT, MINUS, movetoworkspace, 11
bind = $mod SHIFT, EQUAL, movetoworkspace, 12

# Workspace navigation
bind = ALT, TAB, workspace, +1
bind = ALT SHIFT, TAB, workspace, -1
bind = $mod, TAB, workspace, previous

# Layout controls
bind = $mod, G, layoutmsg, orientationleft
bind = $mod, S, layoutmsg, orientationtop
bind = $mod, Z, layoutmsg, orientationcenter
bind = $mod SHIFT, E, togglesplit

# Resize mode
bind = $mod, R, submap, resize
submap = resize
binde = , H, resizeactive, -5 0
binde = , J, resizeactive, 0 5
binde = , K, resizeactive, 0 -5
binde = , L, resizeactive, 5 0
binde = , LEFT, resizeactive, -10 0
binde = , DOWN, resizeactive, 0 10
binde = , UP, resizeactive, 0 -10
binde = , RIGHT, resizeactive, 10 0
bind = , ESCAPE, submap, reset
bind = , RETURN, submap, reset
submap = reset

# Border controls
bind = $mod SHIFT, B, exec, hyprctl keyword general:border_size 0
bind = $mod, T, exec, hyprctl keyword general:border_size 3
bind = $mod, Y, exec, hyprctl keyword general:border_size 3
bind = $mod, U, exec, hyprctl keyword general:border_size 0

# Media keys
# binde = ,XF86AudioRaiseVolume, exec, ~/.local/scripts/volume.sh --inc
# binde = ,XF86AudioLowerVolume, exec, ~/.local/scripts/volume.sh --dec
# bind = ,XF86AudioMute, exec, ~/.local/scripts/volume.sh --toggle
# binde = ,XF86AudioRaiseVolume, exec, ~/.local/scripts/volume.sh --inc
# binde = ,XF86AudioLowerVolume, exec, ~/.local/scripts/volume.sh --dec
# bind = ,XF86AudioMute, exec, ~/.local/scripts/volume.sh --toggle
bind = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bind = , XF86AudioLowerVolume, exec,  swayosd-client --output-volume lower
bind = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioStop, exec, playerctl stop
# bind = , XF86MonBrightnessUp, exec, ~/.local/scripts/brightness.sh --inc
# bind = , XF86MonBrightnessDown, exec, ~/.local/scripts/brightness.sh --dec
bind = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bind = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower
bind = $mod, t, exec, notify-send "Window Info" "$(hyprctl activewindow -j | jq -r '"Class: \(.class)\nTitle: \(.title)\nWorkspace: \(.workspace.name)\nSize: \(.size[0])x\(.size[1])\nPosition: \(.at[0]),\(.at[1])"')"
# Mouse bindings
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

