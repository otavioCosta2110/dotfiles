# Hyprland Configuration
# Converted from Sway config

################ Monitor Configuration
monitor=HDMI-A-1,1920x1080@100,0x0,1
monitor=eDP-1,1920x1080@60,1920x0,1

################ Executions
# exec-once = waybar
# exec-once = swaybg -i ~/Pictures/wallpapers/terra3.png -m fill
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
# exec-once = swayidle -w timeout 300 'swaylock -f -c 000000' timeout 350 'hyprctl dispatch dpms off' resume 'hyprctl dispatch dpms on' timeout 1800 'systemctl suspend' before-sleep 'swaylock -f -c 000000'
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = ~/.local/scripts/workday.sh
exec-once = gammastep -l 29.1913:54.8656
# exec-once = dunst
# exec-once = autotiling
# exec-once = qs -c noctalia-shell

################ Input Configuration
input {
    kb_layout = br
    repeat_delay = 250
    repeat_rate = 35
    follow_mouse = 1
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

general {
    gaps_in = 1
    gaps_out = 0
    border_size = 3
    col.active_border = rgb(d4be98)
    col.inactive_border = rgb(3C3836)
    layout = dwindle
    cursor_inactive_timeout = 0
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_is_master = true
}

gestures {
    workspace_swipe = true
}

################ Appearance
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

################ Key Bindings
# Mod key definition
$mod = SUPER
$mod2 = ALT

# Application keybinds
bind = $mod, RETURN, exec, alacritty
bind = $mod, KP_ENTER, exec, alacritty
bind = CONTROL ALT, T, exec, alacritty
bind = CONTROL ALT, RETURN, exec, alacritty
bind = $mod SHIFT, RETURN, exec, alacritty -e $SHELL -c "cd ~/dev && exec $SHELL"
bind = SHIFT ALT, RETURN, exec, alacritty
bind = CONTROL ALT, KP_ENTER, exec, alacritty

# System applications
bind = $mod SHIFT, D, exec, dmenu_run -i -nb '#191919' -nf '#fea63c' -sb '#fea63c' -sf '#191919' -fn 'NotoMonoRegular:bold:pixelsize=14'
bind = $mod, D, exec, fuzzel
bind = $mod2, D, exec, discord
bind = $mod CONTROL, R, exec, /home/otavio/.local/scripts/recording.sh
bind = $mod, V, exec, pkill fuzzel || caelestia clipboard
bind = CONTROL SHIFT, ESCAPE, exec, alacritty -e btop
bind = CONTROL ALT, M, exec, xfce4-settings-manager
bind = CONTROL ALT, U, exec, pavucontrol
bind = $mod CONTROL, S, exec, spotify
bind = $mod, F1, exec, exo-open --launch webbrowser
bind = $mod, W, exec, exo-open --launch webbrowser
bind = $mod, E, exec, Thunar
bind = $mod, O, exec, alacritty -e bash -c "/home/otavio/.local/scripts/run-old-game-launcher"
bind = $mod SHIFT, F, exec, ~/.local/scripts/favs
bind = $mod SHIFT, V, exec, alacritty -e "/home/otavio/.local/scripts/tmux-sessionizer.sh"

# Screenshots
bind = , PRINT, exec, ~/.local/scripts/screenshot.sh
bind = $mod SHIFT, S, exec, ~/.local/scripts/screenshot.sh area

# System controls
bind = $mod SHIFT, Q, exit
bind = $mod SHIFT, C, reload
bind = $mod SHIFT, R, reload

# Window management
bind = $mod, Q, killactive
bind = $mod, F, fullscreen
bind = $mod SHIFT, SPACE, togglefloating
bind = $mod, SPACE, cyclenext

# Focus movement
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r
bind = $mod, LEFT, movefocus, l
bind = $mod, DOWN, movefocus, d
bind = $mod, UP, movefocus, u
bind = $mod, RIGHT, movefocus, r

# Move windows
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, LEFT, movewindow, l
bind = $mod SHIFT, DOWN, movewindow, d
bind = $mod SHIFT, UP, movewindow, u
bind = $mod SHIFT, RIGHT, movewindow, r

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
bind = $mod, MINUS, workspace, 11
bind = $mod, EQUAL, workspace, 12

# Move windows to workspaces
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10
bind = $mod SHIFT, MINUS, movetoworkspace, 11
bind = $mod SHIFT, EQUAL, movetoworkspace, 12

# Workspace navigation
bind = ALT, TAB, workspace, +1
bind = ALT SHIFT, TAB, workspace, -1
bind = $mod, TAB, workspace, previous

# Layout controls
bind = $mod, G, layoutmsg, orientationleft
bind = $mod, S, layoutmsg, orientationtop
bind = $mod, Z, layoutmsg, orientationcenter
bind = $mod SHIFT, E, togglesplit

# Resize mode
bind = $mod, R, submap, resize
submap = resize
bind = , H, resizeactive, -5 0
bind = , J, resizeactive, 0 5
bind = , K, resizeactive, 0 -5
bind = , L, resizeactive, 5 0
bind = , LEFT, resizeactive, -10 0
bind = , DOWN, resizeactive, 0 10
bind = , UP, resizeactive, 0 -10
bind = , RIGHT, resizeactive, 10 0
bind = , ESCAPE, submap, reset
bind = , RETURN, submap, reset
submap = reset

# Border controls
bind = $mod SHIFT, B, exec, hyprctl keyword general:border_size 0
bind = $mod, T, exec, hyprctl keyword general:border_size 3
bind = $mod, Y, exec, hyprctl keyword general:border_size 3
bind = $mod, U, exec, hyprctl keyword general:border_size 0

# Media keys
bind = , XF86AudioRaiseVolume, exec, ~/.local/scripts/volume.sh --inc
bind = , XF86AudioLowerVolume, exec, ~/.local/scripts/volume.sh --dec
bind = , XF86AudioMute, exec, ~/.local/scripts/volume.sh --toggle
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioStop, exec, playerctl stop
bind = , XF86MonBrightnessUp, exec, ~/.local/scripts/brightness.sh --inc
bind = , XF86MonBrightnessDown, exec, ~/.local/scripts/brightness.sh --dec

# Window rules
windowrule = float, title:.*DEBUG.*
windowrule = float, Blueberry.py
windowrule = float, nl.hjdskes.gcolor3
windowrule = float, Nl.hjdskes.gcolor3
windowrule = float, pavucontrol
windowrule = float, Xfce4-settings-manager
windowrule = float, Xfce4-taskmanager
windowrule = float, Places
windowrule = float, Library
windowrule = float, library
windowrule = float, title:calcurse
windowrule = float, ^(pop-up)$
windowrule = float, ^(Preferences)$
windowrule = float, ^(setup)$

# Workspace rules
workspace = 1, monitor:HDMI-A-1
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:HDMI-A-1
workspace = 4, monitor:HDMI-A-1
workspace = 5, monitor:HDMI-A-1
workspace = 6, monitor:eDP-1
workspace = 7, monitor:eDP-1
workspace = 8, monitor:eDP-1
workspace = 9, monitor:eDP-1
workspace = 10, monitor:eDP-1
workspace = 11, monitor:eDP-1
workspace = 12, monitor:eDP-1
